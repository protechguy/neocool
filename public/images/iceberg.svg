<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 900" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="shard1" x1="0" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#e0f7ff" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#38bdf8" stop-opacity="0.02"/>
    </linearGradient>
    <linearGradient id="shard2" x1="1" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#0ea5e9" stop-opacity="0.01"/>
    </linearGradient>
    <linearGradient id="shard3" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0%" stop-color="#7dd3fc" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#bae6fd" stop-opacity="0.02"/>
    </linearGradient>
    <linearGradient id="shard4" x1="0.5" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f0f9ff" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#0284c7" stop-opacity="0.03"/>
    </linearGradient>
    <linearGradient id="edge1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#38bdf8" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#38bdf8" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="edge2" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#7dd3fc" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#7dd3fc" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Large central crystal cluster -->
  <!-- Main shard — tall, sharp, center-left -->
  <polygon points="680,80 640,320 590,580 670,600 720,340 710,160" fill="url(#shard1)"/>
  <polyline points="680,80 640,320 590,580" stroke="url(#edge1)" stroke-width="0.8" fill="none"/>

  <!-- Wide angled shard — center -->
  <polygon points="720,180 820,500 900,520 860,300 780,140" fill="url(#shard2)"/>
  <polyline points="720,180 820,500 900,520" stroke="url(#edge2)" stroke-width="0.6" fill="none"/>

  <!-- Short thick shard — center-right -->
  <polygon points="800,260 750,480 830,540 890,460 870,300" fill="url(#shard3)"/>

  <!-- Thin spike — left of center -->
  <polygon points="600,160 570,440 610,460 630,200" fill="url(#shard4)"/>
  <polyline points="600,160 570,440" stroke="rgba(56,189,248,0.12)" stroke-width="0.5" fill="none"/>

  <!-- Leaning shard — far right -->
  <polygon points="1020,220 960,500 1000,560 1080,520 1060,280" fill="url(#shard1)"/>
  <polyline points="1020,220 960,500 1000,560" stroke="url(#edge1)" stroke-width="0.6" fill="none"/>

  <!-- Small accent — far left -->
  <polygon points="340,300 310,520 360,540 380,360" fill="url(#shard2)"/>
  <polyline points="340,300 310,520" stroke="rgba(125,211,252,0.1)" stroke-width="0.5" fill="none"/>

  <!-- Tiny shard cluster left -->
  <polygon points="420,380 400,520 440,530 450,400" fill="url(#shard4)"/>
  <polygon points="460,340 470,500 500,490 490,360" fill="url(#shard3)"/>

  <!-- Tiny shard cluster right -->
  <polygon points="1120,340 1100,500 1140,510 1150,360" fill="url(#shard2)"/>
  <polygon points="1170,300 1190,480 1220,470 1200,320" fill="url(#shard4)"/>

  <!-- Scattered small crystals -->
  <polygon points="200,440 185,540 215,545 220,460" fill="url(#shard1)"/>
  <polygon points="1300,380 1280,500 1310,510 1320,400" fill="url(#shard3)"/>
  <polygon points="260,260 240,380 270,390 280,280" fill="url(#shard4)"/>
  <polygon points="1250,240 1230,360 1260,370 1270,260" fill="url(#shard1)"/>

  <!-- Horizontal refraction lines — faint -->
  <line x1="0" y1="350" x2="1440" y2="350" stroke="rgba(56,189,248,0.04)" stroke-width="0.5"/>
  <line x1="0" y1="500" x2="1440" y2="500" stroke="rgba(56,189,248,0.03)" stroke-width="0.5"/>
  <line x1="0" y1="650" x2="1440" y2="650" stroke="rgba(56,189,248,0.02)" stroke-width="0.5"/>

  <!-- Diagonal refraction streaks -->
  <line x1="500" y1="0" x2="400" y2="900" stroke="rgba(186,230,253,0.03)" stroke-width="1"/>
  <line x1="900" y1="0" x2="1000" y2="900" stroke="rgba(186,230,253,0.025)" stroke-width="1"/>
  <line x1="1200" y1="0" x2="1100" y2="900" stroke="rgba(186,230,253,0.02)" stroke-width="0.8"/>

  <!-- Sparkle points — tiny bright dots -->
  <circle cx="680" cy="80" r="2" fill="rgba(255,255,255,0.3)"/>
  <circle cx="600" cy="160" r="1.5" fill="rgba(255,255,255,0.2)"/>
  <circle cx="720" cy="180" r="1.5" fill="rgba(255,255,255,0.25)"/>
  <circle cx="1020" cy="220" r="1.5" fill="rgba(255,255,255,0.2)"/>
  <circle cx="340" cy="300" r="1" fill="rgba(255,255,255,0.15)"/>
  <circle cx="780" cy="140" r="2" fill="rgba(255,255,255,0.2)"/>
  <circle cx="870" cy="300" r="1" fill="rgba(255,255,255,0.15)"/>
  <circle cx="1170" cy="300" r="1" fill="rgba(255,255,255,0.12)"/>
</svg>
